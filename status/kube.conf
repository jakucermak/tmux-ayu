# vim:set ft=tmux:
%hidden MODULE_NAME="kube"

# Requires https://github.com/jonmosco/kube-tmux

set -ogq "@ayu_${MODULE_NAME}_icon" "󱃾 "
set -ogqF "@ayu_${MODULE_NAME}_color" "#{E:@thm_blue}"
set -ogqF "@ayu_kube_context_color" "#{E:@thm_red}"
set -ogqF "@ayu_kube_namespace_color" "#{E:@thm_sky}"
set -ogq "@ayu_${MODULE_NAME}_text" \
   " #{l:#[fg=#{@ayu_kube_context_color}]#{kubectx_context}#[fg=default]:#[fg=#{@ayu_kube_namespace_color}]#{kubectx_namespace}}"

source -F "#{d:current_file}/../utils/status_module.conf"

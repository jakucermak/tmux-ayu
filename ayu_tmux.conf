source -F "#{d:current_file}/themes/ayu_#{@ayu_appearance}_tmux.conf"

%if "#{==:#{@ayu_status_background},default}"
  set -gF @_ayu_status_bg "#{@thm_mantle}"
  set -gF status-style "bg=#{@_ayu_status_bg},fg=#{@thm_fg}"

  %hidden AYU_MESSAGE_BACKGROUND="#{@thm_overlay_0}"
%elif "#{==:#{@ayu_status_background},none}"
  set -g status-style "default"
  set -g @_ayu_status_bg "none"

  %hidden AYU_MESSAGE_BACKGROUND="default"
%else
  # Treat @ayu_status_background as a format string.
  set -gF status-style "bg=#{E:@ayu_status_background},fg=#{@thm_fg}"
  set -gF @_ayu_status_bg "#{E:@ayu_status_background}"

  %hidden AYU_MESSAGE_BACKGROUND="#{E:@ayu_status_background}"
%endif

source -F "#{d:current_file}/status/application.conf"
source -F "#{d:current_file}/status/battery.conf"
source -F "#{d:current_file}/status/clima.conf"
source -F "#{d:current_file}/status/cpu.conf"
source -F "#{d:current_file}/status/date_time.conf"
source -F "#{d:current_file}/status/directory.conf"
source -F "#{d:current_file}/status/gitmux.conf"
source -F "#{d:current_file}/status/host.conf"
source -F "#{d:current_file}/status/kube.conf"
source -F "#{d:current_file}/status/load.conf"
source -F "#{d:current_file}/status/pomodoro_plus.conf"
source -F "#{d:current_file}/status/session.conf"
source -F "#{d:current_file}/status/uptime.conf"
source -F "#{d:current_file}/status/user.conf"
source -F "#{d:current_file}/status/weather.conf"

# messages
set -gF message-style "fg=#{@thm_accent_tint},bg=$AYU_MESSAGE_BACKGROUND,align=centre"
set -gF message-command-style "fg=#{@thm_accent_tint},bg=$AYU_MESSAGE_BACKGROUND,align=centre"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@ayu_menu_selected_style}"
%endif

# panes
set -wgF pane-active-border-style "#{E:@ayu_pane_active_border_style}"
set -wgF pane-border-style "#{E:@ayu_pane_border_style}"

%if "#{==:#{@ayu_pane_status_enabled},yes}"
  # "internal" variables are kept as @_ayu_p_.*
  # and then unset at the end.
  set -gq @_ayu_p_left "" # the content on the left, usually a separator
  set -gq @_ayu_p_middle ""
  set -gq @_ayu_p_right ""
  set -gq @_ayu_p_number ""
  set -gq @_ayu_p_text ""

  %if "#{==:#{@ayu_pane_default_fill},none}"
    set -g @_ayu_p_left \
      "#[fg=#{@thm_surface_0},bg=default]#{@ayu_pane_left_separator}"
    set -g @_ayu_p_middle \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{@ayu_pane_middle_separator}"
    set -g @_ayu_p_right \
      "#[fg=#{@thm_surface_0},bg=default]#{@ayu_pane_right_separator}"

    set -g @_ayu_p_number \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]##{pane_index}"
    set -g @_ayu_p_text \
      "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#{E:@ayu_pane_default_text}"

  %elif "#{==:#{@ayu_pane_default_fill},all}"

    set -g @_ayu_p_left \
      "#[fg=#{E:@ayu_pane_color},bg=default]#{@ayu_pane_left_separator}"
    set -g @_ayu_p_middle \
      "#[fg=#{E:@ayu_pane_color},bg=#{E:@ayu_pane_background_color}]#{@ayu_pane_middle_separator}"
    set -g @_ayu_p_right \
      "#[fg=#{E:@ayu_pane_color},bg=default]#{@ayu_pane_right_separator}"

    set -g @_ayu_p_number \
      "#[fg=#{E:@ayu_pane_background_color},bg=#{E:@ayu_pane_color}]##{pane_index}"
    set -g @_ayu_p_text \
      "#[fg=#{E:@ayu_pane_background_color},bg=#{E:@ayu_pane_color}]#{E:@ayu_pane_default_text}"

  %elif "#{==:#{@ayu_pane_default_fill},number}"

    %if "#{==:#{@ayu_pane_number_position},left}"
      set -g @_ayu_p_left \
        "#[fg=#{E:@ayu_pane_color},bg=default]#{@ayu_pane_left_separator}"
      set -g @_ayu_p_right \
        "#[fg=#{E:@ayu_pane_background_color},bg=default]#{@ayu_pane_right_separator}"
    %else
      set -g @_ayu_p_left \
        "#[fg=#{E:@ayu_pane_background_color},bg=default]#{@ayu_pane_left_separator}"
      set -g @_ayu_p_right \
        "#[fg=#{E:@ayu_pane_color},bg=default]#{@ayu_pane_right_separator}"
    %endif

    set -g @_ayu_p_middle \
      "#[fg=#{E:@ayu_pane_color},bg=#{E:@ayu_pane_background_color}]#{@ayu_pane_middle_separator}"

    set -g @_ayu_p_number \
      "#[fg=#{E:@ayu_pane_background_color},bg=#{E:@ayu_pane_color}]##{pane_index}"
    set -g @_ayu_p_text \
      "#[fg=#{E:@ayu_pane_color},bg=#{E:@ayu_pane_background_color}]#{E:@ayu_pane_default_text}"

  %endif

  %if "#{==:#{@ayu_pane_number_position},left}"
    set -wgF pane-border-format \
      "#{E:@_ayu_p_left}#{E:@_ayu_p_number}#{E:@_ayu_p_middle} #{E:@_ayu_p_text}#{E:@_ayu_p_right}"
  %else
    set -wgF pane-border-format \
      "#{E:@_ayu_p_left}#{E:@_ayu_p_text} #{E:@_ayu_p_middle}#{E:@_ayu_p_number}#{E:@_ayu_p_right}"
  %endif

  set -ug @_ayu_p_left
  set -ug @_ayu_p_middle
  set -ug @_ayu_p_right
  set -ug @_ayu_p_number
  set -ug @_ayu_p_text
%endif

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_surface_1}"
%endif

%if "#{==:#{@ayu_window_status_style},basic}"

  set -gq @ayu_window_left_separator " "
  set -gq @ayu_window_middle_separator " "
  set -gq @ayu_window_right_separator " "

%elif "#{==:#{@ayu_window_status_style},rounded}"

  set -gq @ayu_window_left_separator "#[fg=#{@_ayu_status_bg},reverse]#[none]"
  set -gq @ayu_window_middle_separator " "
  set -gq @ayu_window_right_separator "#[fg=#{@_ayu_status_bg},reverse]#[none]"

%elif "#{==:#{@ayu_window_status_style},slanted}"

  set -gq @ayu_window_left_separator "#[fg=#{@_ayu_status_bg},reverse]#[none]"

  %if "#{==:#{@ayu_window_number_position},left}"
    set -gq @ayu_window_middle_separator "#[fg=#{@ayu_window_number_color},bg=#{@ayu_window_text_color}]"
    set -gq @ayu_window_current_middle_separator \
      "#[fg=#{@ayu_window_current_number_color},bg=#{@ayu_window_current_text_color}]"
  %else
    set -gq @ayu_window_middle_separator " #[fg=#{@ayu_window_number_color},bg=#{@ayu_window_text_color}]"
    set -gq @ayu_window_current_middle_separator \
      " #[fg=#{@ayu_window_current_number_color},bg=#{@ayu_window_current_text_color}]"
  %endif

  set -gq @ayu_window_right_separator "#[fg=#{@_ayu_status_bg},reverse]█#[none]"

%endif

# DO NOT USE -o IN YOUR OWN CONFIGURATION
set -ogqF @ayu_window_current_left_separator "#{@ayu_window_left_separator}"
set -ogqF @ayu_window_current_middle_separator "#{@ayu_window_middle_separator}"
set -ogqF @ayu_window_current_right_separator "#{@ayu_window_right_separator}"

# window status
%if "#{!=:#{@ayu_window_status_style},none}"
  set -gF window-status-activity-style "bg=#{@thm_accent_tint},fg=#{@thm_crust}"
  set -gF window-status-bell-style "bg=#{@thm_yellow},fg=#{@thm_crust}"

   %if "#{==:#{@ayu_window_flags},icon}"
    set -gqF @_ayu_w_flags "#{E:@ayu_window_flags_icon_format}"
  %elif "#{==:#{@ayu_window_flags},text}"
    set -gq @_ayu_w_flags "#F"
  %else
    set -gq @_ayu_w_flags ""
  %endif

  set -g @_ayu_w_number_style "#[fg=#{@thm_crust},bg=#{@ayu_window_number_color}]"
  set -g @_ayu_w_text_style "#[fg=#{@thm_fg},bg=#{@ayu_window_text_color}]"
  %if "#{==:#{@ayu_window_number_position},left}"
    set -gF window-status-format \
      "#{E:@_ayu_w_number_style}#{E:@ayu_window_left_separator}#{@ayu_window_number}"
    set -agF window-status-format "#{E:@ayu_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_ayu_w_text_style}#{@ayu_window_text}#{@_ayu_w_flags}#{E:@ayu_window_right_separator}"
  %else
    set -gF window-status-format \
      "#{E:@_ayu_w_text_style}#{E:@ayu_window_left_separator}#{E:@_ayu_w_text_style}#{@ayu_window_text}#{@_ayu_w_flags}"
    set -agF window-status-format "#{E:@ayu_window_middle_separator}"
    set -agF window-status-format \
      "#{E:@_ayu_w_number_style} #{@ayu_window_number}#{E:@ayu_window_right_separator}"
  %endif

  # =======================================
  # And do the same for the current window.
  # =======================================

  set -g @_ayu_w_number_style "#[fg=#{@thm_crust},bg=#{@ayu_window_current_number_color}]"
  set -g @_ayu_w_text_style "#[fg=#{@thm_fg},bg=#{@ayu_window_current_text_color}]"
  %if "#{==:#{@ayu_window_number_position},left}"
    set -gF window-status-current-format \
      "#{E:@_ayu_w_number_style}#{E:@ayu_window_current_left_separator}#{@ayu_window_current_number}"
    set -agF window-status-current-format "#{E:@ayu_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_ayu_w_text_style}#{@ayu_window_current_text}#{@_ayu_w_flags}#{E:@ayu_window_current_right_separator}"
  %else
    set -gF window-status-current-format \
      "#{E:@_ayu_w_text_style}#{E:@ayu_window_current_left_separator}#{E:@_ayu_w_text_style}#{@ayu_window_current_text}#{@_ayu_w_flags}"
    set -agF window-status-current-format "#{E:@ayu_window_current_middle_separator}"
    set -agF window-status-current-format \
      "#{E:@_ayu_w_number_style} #{@ayu_window_current_number}#{E:@ayu_window_current_right_separator}"
  %endif


  # Cleanup (unset) all of the internal variables.
  set -ug @_ayu_w_number_style
  set -ug @_ayu_w_text_style
  set -ug @_ayu_w_flags
%endif

# Mode style. This is used for copy mode highlighting to style the current selection.
# set -gF mode-style "bg=#{@thm_red},bold"
set -gF mode-style "bg=#{@thm_sky},fg=#{@thm_text}"
set -gF clock-mode-colour "#{@thm_blue}"
